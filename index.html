<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sol PBC</title>
    <link rel="icon" type="image/x-icon" href="static/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="static/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="static/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="static/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            background: #fff;
        }
        h1 {
            font-family: 'Comfortaa', system-ui, sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            color: #222;
            margin-bottom: 2rem;
        }
        .logo {
            max-width: 400px;
            width: 80vw;
        }
        .purpose {
            max-width: 600px;
            width: 90vw;
            margin-top: 2.5rem;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            text-align: center;
        }
        .purpose .highlight {
            color: #e67e22;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <h1>sol pbc</h1>
    <img src="static/solpbc.png" alt="Sol PBC logo" class="logo">
    <p class="purpose">
        The specific public benefit purpose of the Corporation is to advance
        <span class="highlight">digital self-determination</span> by providing
        <span class="highlight">open-source</span>, <span class="highlight">privacy-respecting</span>
        tools and services that enable individuals to directly collect and gain insight from their
        <span class="highlight">personal data</span>.
    </p>
</body>
</html>
